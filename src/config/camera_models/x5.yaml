# Camera model profile: Insta360 X5
# ERP output resolution for SDK stitching
# Native sensor: 10792x5396 per lens. Max theoretical ERP: ~21584x10792.
# 11520x5760 retains most of the sensor detail for high-quality coloring and COLMAP.
erp_width: 11520
erp_height: 5760
# Capture resolution: Size_7680_3840 (enum 21, 8K)
# The .insp raw file always captures at full sensor resolution regardless of
# this setting. This enum only controls the in-camera preview/thumbnail.
photo_size_enum: 21
# White balance: 0=AUTO 1=2700K 2=4000K 3=5000K 4=6500K 5=7500K
# AUTO lets the camera choose per-shot — best for mixed lighting environments
white_balance: 0
# Exposure mode: 0=AUTO 2=SHUTTER_PRIORITY 4=ADAPTIVE
exposure_mode: 0
# Lidar mask filename (relative to src/)
lidar_mask_dual: lidar_mask_dual_x5.png
lidar_mask_single: lidar_mask_single_x5.png
# Display name
display_name: "Insta360 X5"

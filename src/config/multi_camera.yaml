# Multi-camera configuration for alternating capture.
#
# When multiple cameras are active, the `settings` block below is applied
# uniformly to ALL cameras, overriding any per-model defaults from
# camera_models/*.yaml. This ensures consistent exposure, white balance,
# and color temperature across mixed hardware (e.g. X5 + X3).
#
# ─── Finding Camera Serial Numbers ──────────────────────────────────────────
# Serial numbers are REQUIRED for deterministic camera index assignment.
# Without them, cameras may swap between cam_0/cam_1 on each session
# depending on USB enumeration order.
#
# To discover serial numbers, run with cameras connected:
#
#   ~/atlas_ws/src/atlas-scanner/src/capture/sdk/build/insta360_capture_multi --discover
#
# Output example:
#   Found 2 camera(s):
#     [0] serial=XXXXXXXXXXXXXX  type=4  name=Insta360 X5
#     [1] serial=XXXXXXXXXXXXXX  type=3  name=Insta360 ONE X2
#
# Copy the serial strings into the cam_0/cam_1 entries below.
# cam_0 should be your primary/reference camera (best quality).
# ─────────────────────────────────────────────────────────────────────────────

# ─── Shared capture settings (applied to all cameras in multi-camera mode) ───
settings:
  # Exposure mode: 0=AUTO, 2=SHUTTER_PRIORITY, 4=ADAPTIVE
  # AUTO is required for X5 timelapse; use AUTO for consistency across models.
  exposure_mode: 0
  # White balance: 0=AUTO 1=2700K 2=4000K 3=5000K 4=6500K 5=7500K
  # AUTO ensures all cameras produce similar color under the same lighting.
  white_balance: 0
  # EV bias: 0 = no compensation
  ev_bias: 0

# ─── Camera slots ────────────────────────────────────────────────────────────
# Each camera entry maps a logical index to a physical device.
#
# Fields:
#   serial:      Camera serial number (from --discover). REQUIRED for correct
#                index assignment. Without it, cameras may swap indices between
#                sessions depending on USB bus order.
#   camera_hw:   Hardware model (x5, x3, onex2). Selects ERP resolution + default mask.
#   mask_dual:   Per-camera mask filename (in config/masks/). Overrides the
#                camera_hw default. Use when cameras are at different positions
#                and see different parts of the scanner body.
#   mask_single: Same as mask_dual but for single_fisheye mode.
#   mask_calibration: Mask used during per-camera calibration sessions (in
#                config/masks/). Typically blocks only the scanner body/LiDAR
#                as seen from this camera's position — NOT the other cameras,
#                since they are removed during single-camera calibration capture.
#                Falls back to mask_dual if not specified.
#   calibration: Per-camera extrinsic calibration path (relative to config/).
#                Falls back to calibrations/<camera_hw>/fusion_calibration.yaml.
#
# cam_0 = primary/reference camera. Its images are never color-corrected.
# cam_1+ = secondary cameras. Color profiles are applied to match cam_0.
# 
cameras:
  cam_0:
    serial: "XXXXXXXXXXXXXX"
    camera_hw: x5
    mask_dual: lidar_mask_dual_x5_cam2.png
    mask_calibration: lidar_mask_dual_x5_calib.png
    calibration: calibrations/x5/center/fusion_calibration.yaml
  cam_1:
    serial: "XXXXXXXXXXXXXX"
    camera_hw: x3
    mask_dual: lidar_mask_dual_x3_cam_left.png
    mask_calibration: lidar_mask_dual_x3_calib.png
    calibration: calibrations/x3/left/fusion_calibration.yaml
  cam_2:
    serial: "XXXXXXXXXXXXXX"
    camera_hw: onex2
    mask_dual: lidar_mask_dual_onex2_cam_right.png
    mask_calibration: lidar_mask_dual_onex2_calib.png
    calibration: calibrations/onex2/right/fusion_calibration.yaml
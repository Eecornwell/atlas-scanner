# ptp4l config — host acts as PTP master for Livox MID360
# MID360 sends only peer-delay-req (P2P slave); host must be master.
# Hardware timestamping on enp2s0 (Intel igc, /dev/ptp0).

[global]
# Master-only: never become slave to another clock
masterOnly                1
# P2P delay mechanism — matches MID360 peer-delay-req messages
delay_mechanism           P2P
# Layer-2 (802.3) — MID360 uses raw Ethernet PTP, not UDP
network_transport         L2
# Hardware timestamping
time_stamping             hardware
# Sync interval: -3 = 8 Hz (125ms).  MID360 peer-delay at 1Hz is fine.
logSyncInterval           -3
logMinPdelayReqInterval   0
logAnnounceInterval       1
announceReceiptTimeout    3
# Clock accuracy / priority — make host the obvious best master
clockClass                135
clockAccuracy             0x31
offsetScaledLogVariance   0xffff
priority1                 128
priority2                 128
# Tx timestamp timeout (ms) — igc needs a little headroom
tx_timestamp_timeout      20
# Domain 0 matches MID360 default
domainNumber              0

[enp2s0]
